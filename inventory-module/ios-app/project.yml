name: InventoryApp
options:
  bundleIdPrefix: com.inventory
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  InventoryApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Views
      - path: ViewModels
      - path: Utils
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.inventory.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"

  InventoryAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppTests
    dependencies:
      - target: InventoryApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inventory.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/InventoryApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/InventoryApp"
        BUNDLE_LOADER: "$(TEST_HOST)"